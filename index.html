<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энциклопедия Сада НАО "ЗКАТУ им. Жангир хана"</title>
    <style>
        :root {
            --primary: #0a3d62; /* Глубокий темно-синий */
            --primary-light: #60a3bc; /* Светло-голубой для акцентов */
            --bg: #eaf4f4; /* Очень светло-голубой фон всей страницы */
            --card-bg: white;
            --text: #222;
            --header-text: #fff;
            --accent: #fbc531; /* Золотой акцент для подзаголовков */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        header {
            position: relative;
            text-align: center;
            padding: 70px 20px;
            background: var(--primary);
            color: var(--header-text);
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header h1 {
            margin: 0;
            font-size: 2.5em;
        }

        header p {
            margin: 15px 0 0;
            opacity: 0.9;
            color: var(--accent);
            font-weight: bold;
        }
        .logo-link {
            position: absolute;
            top: 20px;
            right: 25px;
            cursor: pointer;
            z-index: 100;
        }

        .logo-img {
            height: 70px;
            width: auto;
            border-radius: 5px;
            transition: transform 0.2s;
            border: 2px solid white;
        }

        .logo-img:hover {
            transform: scale(1.08);
        }
        .lang-switcher {
            position: absolute;
            top: 25px;
            left: 25px;
            display: flex;
            background: rgba(255,255,255,0.15);
            border-radius: 50px;
            padding: 6px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 110;
        }

        .lang-btn {
            padding: 10px 22px;
            margin: 0 4px;
            border: none;
            background: transparent;
            color: var(--header-text);
            font-weight: 600;
            font-size: 1.05em;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .lang-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .lang-btn.active {
            background: #fff;
            color: var(--primary);
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            transform: scale(1.05);
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card-img {
            width: 100%;
            height: 220px; /* Высота фото */
            object-fit: cover;
            border-bottom: 3px solid var(--primary-light);
        }

        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card h3 {
            color: var(--primary);
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.4em;
        }

        .card .type {
            font-size: 0.9em;
            color: var(--primary-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .card p {
            font-size: 0.95em;
            line-height: 1.6;
            margin-top: 0;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        .details-view {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .details-content {
            padding: 40px;
        }

        .details-view img.main-img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-bottom: 4px solid var(--primary);
        }

        .details-view h2 {
            color: var(--primary);
            font-size: 2.2em;
            margin-top: 0;
            margin-bottom: 5px;
        }

        .details-view .type {
            font-size: 1.1em;
            color: var(--primary-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .details-view .detailed-text {
            line-height: 1.9;
            font-size: 1.15em;
            color: #333;
            text-align: justify;
        }

        .details-view .detailed-text h4 {
            color: var(--primary);
            margin-top: 25px;
            margin-bottom: 10px;
        }
        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 25px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.2s;
            cursor: pointer;
            font-weight: bold;
        }

        .back-btn:hover {
            background: var(--primary-light);
        }
        footer {
            text-align: center;
            margin-top: 70px;
            padding: 25px;
            opacity: 0.8;
            font-size: 1em;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .fade-in {
            animation: fadeIn 0.6s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <!-- Красивый переключатель языков (слева сверху) -->
    <div class="lang-switcher">
        <button onclick="switchLang('ru')" id="lang-ru" class="lang-btn active">Русский</button>
        <button onclick="switchLang('kk')" id="lang-kk" class="lang-btn">Қазақша</button>
        <button onclick="switchLang('en')" id="lang-en" class="lang-btn">English</button>
    </div>

    <a onclick="showGrid()" class="logo-link">
        <img src="лого.jpg" alt="Логотип ЗКАТУ" class="logo-img">
    </a>
    <h1 id="header-title">Энциклопедия Сортов Плодового Сада</h1>
    <p id="header-subtitle">НАО "ЗКАТУ им. Жангир хана"</p>
</header>

<div class="grid fade-in" id="tree-grid"></div>

<div class="details-view fade-in" id="details-view">
    <img id="details-img" class="main-img" src="" alt="Сорт">
    <div class="details-content">
        <h2 id="details-name"></h2>
        <div class="type" id="details-type"></div>
        <div class="detailed-text" id="details-desc"></div>
        <div onclick="showGrid()" id="back-btn" class="back-btn">← Вернуться к списку</div>
    </div>
</div>

<footer>
    <p id="footer-text">&copy; 2026 ЗКАТУ им. Жангир хана. Научно-образовательный комплекс.</p>
    <p>Создатели сайта</p>
    <p>Манкеев Ж.К</p>
    <p>Мусина.М.К</p>
    <p>Aбуова Ж.М</p>
</footer>

    let currentLang = 'ru';

    const gridContainer = document.getElementById('tree-grid');
    const detailsView = document.getElementById('details-view');

    function renderGrid() {
        gridContainer.innerHTML = '';
        trees.forEach(tree => {
            gridContainer.innerHTML += `
                <div class="card" onclick="showDetails(${tree.id})">
                    <img src="${tree.img}" alt="${tree.name[currentLang]}" class="card-img">
                    <div class="card-content">
                        <div class="type">${tree.type[currentLang]}</div>
                        <h3>${tree.name[currentLang]}</h3>
                        <p>${tree.cardDesc[currentLang]}</p>
                    </div>
                </div>
            `;
        });
    }

    function showDetails(treeId) {
        const tree = trees.find(t => t.id === treeId);
        if (!tree) return;

        document.getElementById('details-img').src = tree.img;
        document.getElementById('details-name').textContent = tree.name[currentLang];
        document.getElementById('details-type').textContent = tree.type[currentLang];
        document.getElementById('details-desc').innerHTML = tree.longDesc[currentLang] || tree.longDesc.ru;

        gridContainer.style.display = 'none';
        detailsView.style.display = 'block';
        document.getElementById('header-subtitle').style.display = 'none';
    }

    function showGrid() {
        detailsView.style.display = 'none';
        gridContainer.style.display = 'grid';
        document.getElementById('header-subtitle').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function switchLang(lang) {
        currentLang = lang;

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === `lang-${lang}`);
        });

        renderGrid();

        if (detailsView.style.display === 'block') {
            const currentName = document.getElementById('details-name').textContent;
            const tree = trees.find(t => 
                t.name.ru === currentName || t.name.kk === currentName || t.name.en === currentName
            );
            if (tree) {
                document.getElementById('details-name').textContent = tree.name[currentLang];
                document.getElementById('details-type').textContent = tree.type[currentLang];
                document.getElementById('details-desc').innerHTML = tree.longDesc[currentLang] || tree.longDesc.ru;
            }
        }
    }
    renderGrid();
